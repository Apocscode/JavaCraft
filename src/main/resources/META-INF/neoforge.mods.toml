# This is an example neoforge.mods.toml file. It contains the data relating to the loading mods.
# The overall format is standard TOML format, v0.5.0.
# Find more information on toml format here: https://github.com/toml-lang/toml

modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}" #mandatory

license="${mod_license}"

#issueTrackerURL="https://github.com/Apocscode/JavaCraft/issues"

[[mods]] #mandatory
modId="${mod_id}" #mandatory
version="${mod_version}" #mandatory
displayName="${mod_name}" #mandatory
#updateJSONURL=""
#displayURL="https://github.com/Apocscode/JavaCraft"
#logoFile="javacraft.png"
#credits=""
authors="Apocscode"
description='''
JavaCraft - A Minecraft mod built with NeoForge.
Compatible with All the Mods 10 (ATM10).
'''

#[[mixins]]
#config="${mod_id}.mixins.json"

#[[accessTransformers]]
#file="META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

#[features.${mod_id}]
#openGLVersion="[3.2,)"
