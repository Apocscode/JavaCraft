plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.22'
    id 'com.gradleup.shadow' version '9.0.0-beta13'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    srcDir('src/generated/resources')
    exclude("**/*.bbmodel")
    exclude("src/generated/**/.cache")
}

repositories {
    mavenCentral()
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

//minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')

// Default run configurations.
runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        modSource project.sourceSets.main
        // Allow mod module to access LuaJ on classpath (unnamed module) during dev runs
        jvmArgument '--add-reads=byteblock=ALL-UNNAMED'
    }

    client {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        arguments.addAll '--mod', project.mod_id, '--all', '--output',
                file('src/generated/resources/').getAbsolutePath(), '--existing',
                file('src/main/resources/').getAbsolutePath()
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"
    // LuaJ — pure-Java Lua 5.2 interpreter (shadow-relocated to avoid conflicts)
    implementation "org.luaj:luaj-jse:3.0.1"
    shadow "org.luaj:luaj-jse:3.0.1"
    // BeanShell — pure-Java Java-syntax interpreter for the in-game `java` REPL
    implementation "org.apache-extras.beanshell:bsh:2.0b6"
    shadow "org.apache-extras.beanshell:bsh:2.0b6"

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Enable JUnit 5 for test task
tasks.named('test', Test) {
    useJUnitPlatform()
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

// Copy LuaJ classes into mod output so SecureJarHandler can find them during dev runs.
// In production the shadow jar relocates LuaJ, but BootstrapLauncher's classloader
// bypasses -cp so bare LuaJ jars are invisible to the mod module.
tasks.register('copyLuaJForDev', Copy) {
    from(zipTree(configurations.shadow.files.find { it.name.startsWith('luaj') }))
    into(sourceSets.main.output.classesDirs.singleFile)
    include 'org/**/*.class', 'lua/**'
    exclude 'luajc*'
}
tasks.register('copyBeanShellForDev', Copy) {
    from(zipTree(configurations.shadow.files.find { it.name.startsWith('bsh') }))
    into(sourceSets.main.output.classesDirs.singleFile)
    include 'bsh/**/*.class'
}
tasks.named('classes').configure { finalizedBy 'copyLuaJForDev', 'copyBeanShellForDev' }

// Ensure all tasks that use build/classes/java/main declare the dependency
afterEvaluate {
    ['compileTestJava', 'shadowJar'].each { taskName ->
        tasks.findByName(taskName)?.dependsOn('copyLuaJForDev', 'copyBeanShellForDev')
    }
    tasks.matching { it.name.startsWith('run') || it.name.startsWith('writeMinecraft') }.configureEach {
        dependsOn 'copyLuaJForDev', 'copyBeanShellForDev'
    }
}

// Shadow: relocate LuaJ + BeanShell to avoid conflicts with other mods
shadowJar {
    dependsOn 'copyLuaJForDev', 'copyBeanShellForDev'
    archiveClassifier.set('')
    configurations = [project.configurations.shadow]
    relocate 'org.luaj', 'com.apocscode.byteblock.shadow.luaj'
    relocate 'bsh', 'com.apocscode.byteblock.shadow.bsh'
    exclude 'luajc*'
    exclude 'META-INF/services/javax.script.ScriptEngineFactory'
}

// Make shadow jar the default output
tasks.named('jar').configure { enabled = false }
tasks.named('build').configure { dependsOn shadowJar }

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
